# LAM Registry — single source of truth for every LAM checkpoint we evaluate.
#
# Each entry must have:
#   ckpt_path     — absolute path on disk (one of the formats below).
#   ckpt_format   — one of:
#                     official       (HuggingFace-style LAM_400k.ckpt; Lightning module state_dict
#                                     keyed at lam.lam.* directly under top-level state_dict)
#                     finetune_ddp   (our finetune output: ckpt['state_dict'] with leading
#                                     "module." / "encoder." prefixes from DDP+TripleEncoderWrapper.
#                                     Falls back to "official" base for any missing keys, so the
#                                     finetune ckpt only needs to contain the trainable subset.)
#                     latent_action_state_dict
#                                    (joint-trained LAM: ckpt = {"lam": sd, "heads": ..., "step": N}
#                                     where `sd` is a FULL LatentActionModel state_dict keyed at the
#                                     inner level ("action_prompt"/"encoder.*"/"decoder.*"/"fc.*").
#                                     Loader prefixes each key with "lam.lam." and overlays it on the
#                                     official base. Optional `state_key` (default "lam") selects the
#                                     sub-dict. This is the format produced by training_scope/LAM joint
#                                     trainers and consumed by their probes via load_init_ckpt.)
#   base_ckpt     — only for finetune_ddp: which official ckpt to merge over (defaults to
#                   old_lam_400k if omitted).
#   output_dim    — z dim, must be 32 for ACWM action_vec[352:384] slot.
#   parent        — registry id of the LAM this one was fine-tuned from, or "none" for base.
#   status        — see schema in spec §B.2 (LAM-candidate gate verdict).
#   allowed_for_wm_control — bool. If true, this LAM may enter WM training even if it
#                            failed the LAM candidate gate. Use this for old_lam_400k:
#                            it has identity collapse (gate fail) BUT is the LAM the
#                            upstream 2B pretrained WM was originally trained against,
#                            so it MUST be available as M1 control for M2 vs M1 comparison.
#                            The decision is enforced by tools/train_wm_compat.py — gate
#                            status is informational; this flag is the ACL.
#   notes         — free-form one-line description.

lams:

  # -------- baselines --------
  old_lam_400k:
    ckpt_path: lammodel/checkpoints/DreamDojo/LAM_400k.ckpt
    ckpt_format: official
    output_dim: 32
    parent: none
    status: lam_gate_failed                 # identity collapse: agibot identity_ratio 0.74
    allowed_for_wm_control: true            # MUST be allowed — see header comment & §3.5
    notes: official upstream ACWM LAM, 400k step pretrained — used as M1 WM control

  # -------- v1 same-z camera-clean (current strongest qualifier) --------
  lam_v1_camera_clean_step9800:
    ckpt_path: outputs/lam_v1_samez_camera_smoke_8h/checkpoints/step_009800.pt
    ckpt_format: finetune_ddp
    base_ckpt: old_lam_400k
    output_dim: 32
    parent: old_lam_400k
    status: qualified_for_wm_smoke
    allowed_for_wm_control: true            # candidate AND eligible (gate-passing LAM is always allowed)
    train_data: agibot_35k_bridge_15k
    notes: same-z 32D, camera/no-op intervention. identity_ratio 0.077 / camera_only_shift3 0.118 / ss_drift_shift3 0.470

  # -------- joint-trained LAM (decoder + siglip heads), v2_dec2 λ_dec=2 (2026-06-04) --------
  lam_joint_v2dec2:
    ckpt_path: "New LAM/results/v2_dec2/ckpt_last.pt"
    ckpt_format: latent_action_state_dict
    state_key: lam                          # ckpt = {"lam": full LatentActionModel sd, "siglip_head", "heads", "step"}
    base_ckpt: old_lam_400k                  # official base; ckpt's `lam` sd fully overlays all 839 inner keys
    output_dim: 32
    parent: old_lam_400k
    status: lam_gate_unknown
    allowed_for_wm_control: true
    train_data: joint_lam_dec_siglip_v2_dec2
    notes: Joint-trained LAM (LatentActionModel + decoder + siglip heads), run v2_dec2, λ_dec=2, step 5580 (ckpt_last.pt). z = z_mu (deterministic, 32-D) at lam-resolution 240x320. Registered via new latent_action_state_dict format that prefixes ckpt['lam'] keys with lam.lam. and overlays the official base. Verified build_encoder z matches training-side encode_trunks(build_lam('CD_LAM_BASE').lam) on agibot_beta frame pair.

  # -------- v5.3 pure-ego trained from raw LAM_400k (2026-05-10) --------
  lam_v5_3_ego_step1499:
    ckpt_path: outputs/lam_v5_3_train/v5_3_ego_pure_oldinit_1500/checkpoints/step_001499_finetune_ddp.pt
