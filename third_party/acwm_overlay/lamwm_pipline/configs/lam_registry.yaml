    parent: old_lam_400k
    status: qualified_for_wm_smoke
    allowed_for_wm_control: true
    train_data: egodex_196k_epickitchens_8k
    notes: v5.3 pure-ego 88min training from raw LAM_400k. EgoDex eval n=300 vs old LAM A — top1 0.677 (+6.3%), top5 0.618 (+10.9%), id_p50 0.039 (-92%), z_norm 3.36 (-45%), PSNR -6.3dB (healthy = z no longer encodes frame copy). Source ckpt step_001499.pt converted via LAM_V5_3/tools/convert_v5_3_to_finetune_ddp.py (839 keys full state_dict).

  # -------- v6.1-A no-mask, 900-step DDP4 finetune from old_lam_400k (2026-05-14) --------
