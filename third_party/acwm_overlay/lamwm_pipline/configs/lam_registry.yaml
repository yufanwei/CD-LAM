    output_dim: 32
    parent: old_lam_400k
    status: lam_gate_passed
    allowed_for_wm_control: true
    train_data: cleandata_5dataset_8608clips_9p85h
    notes: "v6.1-A simple no-mask (full-frame MSE + raw-z SigCLR + L_id + KL). Four-device DDP, B_real=54, 900 steps, checkpoint 899. IND validation: id_p50 0.031, rev_cos -0.129, PSNR 25.06 dB. AgiBot gate: id_ratio 0.071 and cam_shift3 1.83. Temporarily enabled for the corrected-loader diagnostic."

  # -------- v6.1-B mask-lite, 900-step DDP4 finetune from old_lam_400k (2026-05-14) --------
  lam_v6_1_B_step899:
    ckpt_path: outputs/lam_v6_1_train/B_mask_lite_20260514_190935/checkpoints/step_000899_finetune_ddp.pt
    ckpt_format: finetune_ddp
    base_ckpt: old_lam_400k
    output_dim: 32
    parent: old_lam_400k
    status: lam_gate_passed
    allowed_for_wm_control: false
    train_data: cleandata_5dataset_8608clips_9p85h
    notes: "v6.1-B mask-lite (foreground reconstruction + background consistency + raw-z SigCLR + L_id + KL). Four-device DDP, B_real=54, 900 steps, checkpoint 899. Results are within noise of v6.1-A; v6.1-A is preferred because it does not require the mask pipeline."

