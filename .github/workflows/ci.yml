name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHONHASHSEED: "0"
  OMP_NUM_THREADS: "1"
  MKL_NUM_THREADS: "1"
  PIP_NO_CACHE_DIR: "1"
  TOKENIZERS_PARALLELISM: "false"

jobs:
  source-release:
    name: Source checks / Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10"]

    steps:
      - name: Check out source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install pinned validation environment
        run: |
          python -m pip install torch==2.7.0 \
            --index-url https://download.pytorch.org/whl/cu128
          python -m pip install -r requirements.lock
          python -m pip install --no-build-isolation --no-deps -e ".[test]"

      - name: Release hygiene and English-only scan
        run: python scripts/release_check.py --strict

      - name: CUDA package contract
        run: |
          python - <<'PY'
          import torch

          assert torch.__version__ == "2.7.0+cu128"
          assert torch.version.cuda == "12.8"
          PY

      - name: Ruff
        run: python -m ruff check .

      - name: Unit tests
        run: python -m pytest -q

      - name: Core smoke
        run: python -m cd_lam smoke

      - name: Portable data pipeline
        run: |
          python -m cd_lam data-prepare \
            --input tests/fixtures/episodes.jsonl \
            --output "$RUNNER_TEMP/test-data"
          python -m cd_lam data-validate --root "$RUNNER_TEMP/test-data"

      - name: Build wheel
        run: python -m build --wheel --outdir dist

      - name: Inspect wheel contents
        run: python scripts/check_wheel.py dist/*.whl

      - name: Install wheel in an isolated environment
        run: |
          python -m venv --system-site-packages "$RUNNER_TEMP/wheel-venv"
          "$RUNNER_TEMP/wheel-venv/bin/python" -m pip install \
            "pip>=24.1,<27"
          "$RUNNER_TEMP/wheel-venv/bin/python" -m pip install --no-deps dist/*.whl
          "$RUNNER_TEMP/wheel-venv/bin/python" -m pip check

      - name: Test installed wheel outside the checkout
        working-directory: ${{ runner.temp }}
        run: |
          "$RUNNER_TEMP/wheel-venv/bin/python" -c \
            "import cd_lam; print(cd_lam.__version__)"
          "$RUNNER_TEMP/wheel-venv/bin/python" -c \
            "import cdlam_runtime; print(cdlam_runtime.__version__)"
          "$RUNNER_TEMP/wheel-venv/bin/python" -c \
            "import torch; assert torch.__version__ == '2.7.0+cu128'; assert torch.version.cuda == '12.8'"
          "$RUNNER_TEMP/wheel-venv/bin/cdlam-runtime" --help
          "$RUNNER_TEMP/wheel-venv/bin/python" -m cd_lam smoke
