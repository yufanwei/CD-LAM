name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CUDA_VISIBLE_DEVICES: ""
  PYTHONHASHSEED: "0"
  OMP_NUM_THREADS: "1"
  MKL_NUM_THREADS: "1"
  TOKENIZERS_PARALLELISM: "false"

jobs:
  cpu-release:
    name: CPU release / Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.12"]

    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install pinned validation environment
        run: |
          python -m pip install torch==2.7.0 \
            --index-url https://download.pytorch.org/whl/cpu
          python -m pip install -r requirements.lock
          python -m pip install --no-deps -e ".[test]"

      - name: Release hygiene and English-only scan
        run: python scripts/release_check.py --strict

      - name: Ruff
        run: python -m ruff check .

      - name: Unit tests
        run: python -m pytest -q

      - name: Core smoke
        run: python -m cd_lam smoke

      - name: Portable data pipeline
        run: |
          python -m cd_lam data-prepare \
            --input tests/fixtures/episodes.jsonl \
            --output "$RUNNER_TEMP/test-data"
          python -m cd_lam data-validate --root "$RUNNER_TEMP/test-data"

      - name: Deterministic synthetic train smoke
        run: |
          python -m cd_lam train-smoke \
            --output-root "$RUNNER_TEMP/source-train-smoke" \
            --steps 2 \
            --json > "$RUNNER_TEMP/source-train-smoke.json"
          python - <<'PY'
          import json
          import math
          import os
          from pathlib import Path

          payload = json.loads(
              (Path(os.environ["RUNNER_TEMP"]) / "source-train-smoke.json").read_text()
          )
          expected = ["stage1", "stage2", "bridge-train", "stage3"]
          assert payload["status"] == "pass"
          assert payload["stage_order"] == expected
          assert [record["stage"] for record in payload["stages"]] == expected
          assert len(payload["stages"]) == 4
          for record in payload["stages"]:
              assert record["status"] == "pass"
              for key in ("initial_loss", "final_loss", "best_loss"):
                  assert isinstance(record[key], (int, float))
                  assert math.isfinite(record[key])
          assert payload["summary_path"].endswith("run_summary.json")
          print(json.dumps(payload, indent=2, sort_keys=True))
          PY

      - name: Build wheel
        run: python -m build --wheel --outdir dist

      - name: Inspect wheel contents
        run: python scripts/check_wheel.py dist/*.whl

      - name: Install wheel in a clean environment
        run: |
          python -m venv "$RUNNER_TEMP/wheel-venv"
          "$RUNNER_TEMP/wheel-venv/bin/python" -m pip install \
            "pip>=24.1,<27"
          "$RUNNER_TEMP/wheel-venv/bin/python" -m pip install torch==2.7.0 \
            --index-url https://download.pytorch.org/whl/cpu
          "$RUNNER_TEMP/wheel-venv/bin/python" -m pip install -r requirements.lock
          "$RUNNER_TEMP/wheel-venv/bin/python" -m pip install --no-deps dist/*.whl
          "$RUNNER_TEMP/wheel-venv/bin/python" -m pip check

      - name: Test installed wheel outside the checkout
        working-directory: ${{ runner.temp }}
        run: |
          "$RUNNER_TEMP/wheel-venv/bin/python" -c \
            "import cd_lam; print(cd_lam.__version__)"
          "$RUNNER_TEMP/wheel-venv/bin/python" -m cd_lam smoke
          "$RUNNER_TEMP/wheel-venv/bin/python" -m cd_lam train-smoke \
            --output-root "$RUNNER_TEMP/wheel-train-smoke" \
            --steps 2 \
            --json
